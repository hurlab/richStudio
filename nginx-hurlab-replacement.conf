map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
	listen 80;
	listen [::]:80;
	listen 8080;
	listen [::]:8080;
	server_name hurlab.med.und.edu;

	# DPNKB API — proxy to FastAPI backend
	location /DPNKB/api/ {
		proxy_pass http://127.0.0.1:8100/api/;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# DPNKB static files + SPA fallback
	location /DPNKB/ {
		root /home/hurlab/apache-tomcat-9.0.37/webapps;
		index index.html;
		try_files $uri $uri/ /DPNKB/index.html;
	}

	# SciMiner 2.0 Swagger docs (root-level uvicorn routes)
	location = /SciMiner2.0/docs {
		proxy_pass http://127.0.0.1:9002/docs;
		proxy_set_header Host $host;
	}
	location = /SciMiner2.0/docs/ {
		proxy_pass http://127.0.0.1:9002/docs;
		proxy_set_header Host $host;
	}
	location = /SciMiner2.0/redoc {
		proxy_pass http://127.0.0.1:9002/redoc;
		proxy_set_header Host $host;
	}
	location = /SciMiner2.0/api/openapi.json {
		proxy_pass http://127.0.0.1:9002/openapi.json;
		proxy_set_header Host $host;
	}
	location = /SciMiner2.0/api/health {
		proxy_pass http://127.0.0.1:9002/health;
		proxy_set_header Host $host;
	}

	# SciMiner 2.0 API routes -> uvicorn
	# /SciMiner2.0/api/v1/... -> /api/v1/...
	location /SciMiner2.0/api/ {
		rewrite ^/SciMiner2\.0(/.*)$ $1 break;
		proxy_pass http://127.0.0.1:9002;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 300;
	}

	# SciMiner 2.0 WebSocket
	location /SciMiner2.0/ws {
		proxy_pass http://127.0.0.1:9002/ws;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
	}

	# richStudio: static assets (served immediately, even during cold start)
	location /richStudio_3/favicon.svg {
		alias /home/juhur/shinyapps/richStudio_3/inst/application/www/favicon.svg;
		expires 7d;
	}

	# richStudio: initial page — 5s timeout so loading page appears quickly
	# during cold start (Shiny holds connection open ~30s while R loads)
	location = /richStudio_3/ {
		proxy_pass http://127.0.0.1:3838/richStudio_3/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 5;
		proxy_connect_timeout 3;
		proxy_intercept_errors on;
		error_page 502 503 504 =200 @richstudio_loading;
	}

	# richStudio: all sub-paths (assets, websocket, API) — long timeout
	location /richStudio_3/ {
		proxy_pass http://127.0.0.1:3838/richStudio_3/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 300;
		proxy_connect_timeout 60;
		proxy_send_timeout 300;
	}

	# richStudio: loading page fallback
	location @richstudio_loading {
		root /home/juhur/shinyapps/richStudio_3/inst/application/www;
		rewrite ^ /loading.html break;
		add_header Cache-Control "no-cache, no-store";
	}

	# Everything else -> Tomcat (port 8081)
	location / {
	        proxy_pass http://localhost:8081;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection keep-alive;
		proxy_set_header Host $host;
		proxy_cache_bypass $http_upgrade;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded_Proto $scheme;
	}
}

