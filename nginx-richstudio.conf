# richStudio nginx reverse proxy configuration
# Add this location block inside the server { } blocks in /etc/nginx/sites-enabled/default
# (both the port 80 and port 443 server blocks)
#
# Also add this map directive OUTSIDE all server blocks (at the http level):
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       '' close;
#   }

# --- richStudio: static assets (favicon, loading page) ---
location /richStudio_3/favicon.svg {
    alias /home/juhur/shinyapps/richStudio_3/inst/application/www/favicon.svg;
    expires 7d;
}

# --- richStudio: reverse proxy to Shiny Server ---
location /richStudio_3/ {
    proxy_pass http://127.0.0.1:3838/richStudio_3/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 10;
    proxy_send_timeout 300;

    # When Shiny is still starting (502/503/504), serve loading page
    proxy_intercept_errors on;
    error_page 502 503 504 =200 @richstudio_loading;
}

# --- richStudio: loading page fallback ---
location @richstudio_loading {
    root /home/juhur/shinyapps/richStudio_3/inst/application/www;
    rewrite ^ /loading.html break;
}
